apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-1
        type: email
        settings:
          addresses: "YOUR_EMAIL@company.com"
          singleEmail: false

  - orgId: 1
    name: teams-alerts
    receivers:
      - uid: teams-1
        type: teams
        settings:
          url: "YOUR_TEAMS_WEBHOOK_URL"
          title: "HCM Alert"
          sectiontitle: "Alert Details"

policies:
  - orgId: 1
    receiver: email-alerts
    group_by: ['alertname', 'service']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: teams-alerts
        matchers:
          - severity = critical
        continue: true
      - receiver: email-alerts
        matchers:
          - severity = critical
        continue: false
      - receiver: email-alerts
        matchers:
          - severity = warning
        continue: false
