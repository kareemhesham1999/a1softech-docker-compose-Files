groups:
  - name: hcm_api_alerts
    rules:
      - alert: HCM_HighErrorRate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: hcm-webui
        annotations:
          summary: "HCM API error rate above 5%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HCM_HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)) > 3
        for: 5m
        labels:
          severity: warning
          service: hcm-webui
        annotations:
          summary: "HCM API P95 latency above 3 seconds"
          description: "P95 latency is {{ $value }}s over the last 5 minutes."

      - alert: HCM_TooManyActiveRequests
        expr: sum(http_server_active_requests) > 200
        for: 2m
        labels:
          severity: warning
          service: hcm-webui
        annotations:
          summary: "HCM API has too many active requests"
          description: "Active requests: {{ $value }}"

      - alert: HCM_HighGCPressure
        expr: rate(process_runtime_dotnet_gc_collections_count_total{generation="gen2"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          service: hcm-webui
        annotations:
          summary: "High Gen2 GC collection rate"
          description: "Gen2 GC rate: {{ $value }}/sec"

      - alert: HCM_ThreadPoolStarvation
        expr: process_runtime_dotnet_thread_pool_queue_length > 100
        for: 2m
        labels:
          severity: critical
          service: hcm-webui
        annotations:
          summary: "Thread pool queue length is high"
          description: "Queue length: {{ $value }}"

      - alert: HCM_HighMemoryUsage
        expr: process_runtime_dotnet_gc_heap_size_bytes > 2147483648
        for: 10m
        labels:
          severity: warning
          service: hcm-webui
        annotations:
          summary: "HCM API memory usage above 2GB"
          description: "Heap size: {{ $value | humanize1024 }}"

  - name: infrastructure_alerts
    rules:
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"

      - alert: TempoDown
        expr: up{job="tempo"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tempo is down"

      - alert: HCM_APIDown
        expr: up{job=~"hcm-webui.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HCM API is unreachable"
          description: "Prometheus cannot scrape {{ $labels.job }} for more than 2 minutes."
